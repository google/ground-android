# For more details, see: https://github.com/marketplace/actions/todo-to-issue

# This job will only run on the original repository, not on forks.
# Disabled in https://github.com/google/ground-android/issues/3101.

name: "Run TODO to Issue"
on:
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write   # the workflow pushes a commit back to the PR head branch
  issues: write     # alstr/todo-to-issue-action creates issues for TODOs

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        if: github.event.pull_request.head.repo.full_name == github.repository
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false
      - name: "TODO to Issue"
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: alstr/todo-to-issue-action@64aca8fda7023259aada83ba44ad988c4c443657 # v5.1.14
        with:
          AUTO_ASSIGN: "true"
          INSERT_ISSUE_URLS: "true"
          CLOSE_ISSUES: "false"
      - name: Set Git user
        # Use env to pass values from workflow expressions into the shell safely.
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          ACTOR: ${{ github.actor }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git config --global user.name "$ACTOR"
          git config --global user.email "$(git log -n 1 --pretty=format:%ae -- "remotes/origin/$HEAD_REF")"
      - name: Commit and Push Changes
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git add -A
          if [[ $(git status --porcelain) ]]; then
            git commit -m "Automatically added GitHub issue links to TODOs"
            git push origin -- "$HEAD_REF"
          else
            echo "No changes to commit"
          fi
