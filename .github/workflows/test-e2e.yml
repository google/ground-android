name: End to End Test

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      MAPS_API_KEY:
        required: true

permissions:
  contents: read

jobs:
  request-approval:
    runs-on: ubuntu-latest
    environment: e2e-approval
    steps:
      - run: echo "Approval granted"

  instrumentation-matrix:
    name: API ${{ matrix.api-level }}
    needs: request-approval
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - api-level: 30
            required: true
          - api-level: 24
            required: false
    continue-on-error: ${{ !matrix.required }}
    env:
      FIREBASE_CLI_EXPERIMENTS: webframeworks

    # See docs/e2e-testing-doc.md for details on how this is setup
    steps:
      - name: Start Firebase emulator
        uses: google/ground-platform/.github/actions/start-emulator@master
        with:
          platform-repository: google/ground-platform

      - name: Checkout PR
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          # Gated by the request-approval job (environment: e2e-approval) before fork code runs.
          allow-unsafe-pr-checkout: true

      - name: Run Android tests on e2eTest module
        uses: ./.github/actions/submit-test
        with:
          android-repository: google/ground-android
          upload-artifacts: true
          google-maps-key: ${{ secrets.MAPS_API_KEY }}
          api-level: ${{ matrix.api-level }}

  run-instrumentation-tests:
    needs: instrumentation-matrix
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check matrix results
        run: |
          if [ "${{ needs.instrumentation-matrix.result }}" != "success" ]; then
            echo "Required instrumentation tests failed"
            exit 1
          fi
